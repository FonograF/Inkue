name: Release

# Triggered by pushing a version tag: git tag v1.0.0 && git push --tags
# Produces a draft GitHub release with signed installers for all 3 platforms.
#
# ── One-time setup required ──────────────────────────────────────────────────
#
# 1. Windows libmpv binary (gitignored, ~113 MB):
#    Fetched automatically by the Windows job from the upstream shinchiro build on
#    SourceForge (pinned filename + SHA-256 below — SourceForge keeps old builds for
#    years, so the pin is stable). To update libmpv, change LIBMPV_URL / LIBMPV_SHA256
#    in the "Download libmpv (Windows)" step. No manual upload needed.
#
# 2. macOS signing + notarization (Apple Developer Program required):
#    Set these repository secrets (Settings → Secrets → Actions):
#      APPLE_CERTIFICATE          base64-encoded .p12 Developer ID Application cert
#      APPLE_CERTIFICATE_PASSWORD .p12 export password
#      APPLE_SIGNING_IDENTITY     "Developer ID Application: Your Name (TEAMID)"
#      APPLE_ID                   your Apple ID email
#      APPLE_PASSWORD             app-specific password (appleid.apple.com)
#      APPLE_TEAM_ID              10-character Apple Team ID
#    Without these secrets the build still succeeds but the .app won't be notarized
#    and Gatekeeper will block it.
#
# 3. Tauri updater signing (optional — enables in-app update checks):
#    a. Generate key pair: pnpm tauri signer generate -w ~/.tauri/inkue.key
#    b. Add the public key to tauri.conf.json under plugins.updater.pubkey
#    c. Set these repository secrets:
#         TAURI_SIGNING_PRIVATE_KEY          contents of ~/.tauri/inkue.key
#         TAURI_SIGNING_PRIVATE_KEY_PASSWORD key password (empty string if none)
#    The tauri-action will then sign update bundles and generate latest.json automatically.
#
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:   # allow manual trigger for testing (always creates a draft)

permissions:
  contents: write   # required to create GitHub releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust-targets: ''

          - platform: macos-latest
            target: universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin

          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # ── Node + pnpm ──────────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # ── Rust ─────────────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Frontend deps ────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: pnpm install

      # ── Platform-specific: provide libmpv ────────────────────────────────────

      - name: Download libmpv (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # Pinned shinchiro libmpv build (x86_64 baseline — runs on all x86-64 CPUs,
          # unlike the AVX2-only "-v3" variant). This is byte-identical to the libmpv
          # the app is developed/tested against. SourceForge retains old builds, so the
          # pin stays resolvable. To bump: pick a new file from
          # https://sourceforge.net/projects/mpv-player-windows/files/libmpv/ and update
          # both values below (its SHA-256 is the hash of the .7z archive).
          $LIBMPV_URL    = 'https://downloads.sourceforge.net/project/mpv-player-windows/libmpv/mpv-dev-x86_64-20260412-git-062f4bf.7z'
          $LIBMPV_SHA256 = 'f66f04075da0cbccd106513eab67b78b72ac00780423a9fe3c6e34ae93317806'

          New-Item -ItemType Directory -Force src-tauri/vendor/mpv | Out-Null
          Write-Host "Downloading libmpv from $LIBMPV_URL"
          curl.exe -fSL -o mpv-dev.7z $LIBMPV_URL

          $actual = (Get-FileHash mpv-dev.7z -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $LIBMPV_SHA256) {
            Write-Error "libmpv checksum mismatch: expected $LIBMPV_SHA256, got $actual"
            exit 1
          }

          7z e -y mpv-dev.7z libmpv-2.dll "-osrc-tauri/vendor/mpv"
          if (-not (Test-Path src-tauri/vendor/mpv/libmpv-2.dll)) {
            Write-Error "libmpv-2.dll was not extracted"
            exit 1
          }
          Write-Host "libmpv-2.dll ready"

      - name: Bundle libmpv + Homebrew deps (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install mpv
          bash scripts/bundle_macos_libs.sh

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libssl-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev \
            libasound2-dev libmpv-dev

      # ── Build + publish ───────────────────────────────────────────────────────
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing is intentionally OFF until certificates are configured.
          # Passing empty APPLE_* secrets makes tauri attempt `security import` and
          # fail the macOS build, so the signing env vars are omitted on purpose.
          # To enable signing later: set the repository secrets listed in the header
          # comment, then restore the APPLE_* / TAURI_SIGNING_* env vars here.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Inkue ${{ github.ref_name }}
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --target ${{ matrix.target }}
