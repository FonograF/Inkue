name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Create stub libmpv-2.dll for tauri-build resource validation
        run: |
          New-Item -ItemType Directory -Force vendor\mpv | Out-Null
          [System.IO.File]::WriteAllBytes("vendor\mpv\libmpv-2.dll", @())
      - name: Create empty frontend dist for tauri::generate_context!
        run: New-Item -ItemType Directory -Force ..\dist | Out-Null
      - run: cargo check
      - run: cargo test

  check-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Create stub libmpv.dylib for tauri-build resource validation
        run: mkdir -p vendor/mpv && touch vendor/mpv/libmpv.dylib
      - name: Create empty frontend dist for tauri::generate_context!
        run: mkdir -p ../dist
      - run: cargo clippy --all-targets
      - run: cargo test

  check-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libasound2-dev
      - name: Create empty frontend dist for tauri::generate_context!
        run: mkdir -p ../dist
      - run: cargo check
